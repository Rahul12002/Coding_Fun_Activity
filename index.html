    <audio

    <script>
      // Countdown to April 2, 2026
      const targetDate = new Date("2026-04-02T00:00:00");
      function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById("countdown").innerText =
          `Only ${days} days, ${hours} hours, ${minutes} minutes, ${seconds} seconds until our adventure! ⏳`;
      }
      setInterval(updateCountdown, 1000);
      updateCountdown();
      // Surprise modal
      setTimeout(
        () =>
          showModal("Surprise! I love you more than anything in the world 💕"),
        5000,
      );
    </script>
    <script src="./script.js"></script>
